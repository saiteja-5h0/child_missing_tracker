<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Child Missing Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="portal-page">
  <main class="login-box">
    <a class="back-link" href="index.html">Back to portals</a>
    <h1 id="loginTitle">Login</h1>
    <p id="loginHint" class="muted"></p>

    <form id="loginForm" class="stack-form">
      <label>Email<input id="email" type="email" required autocomplete="username"></label>
      <label>Password<input id="password" type="password" required autocomplete="current-password"></label>
      <button class="primary-button" type="submit">Login</button>
    </form>
  </main>

  <script src="script.js"></script>
</body>
</html>
